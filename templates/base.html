<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
  <head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Trab1 Web{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      form p {
        margin-bottom: 1rem;
      }

      form p label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 600;
      }

      form p .helptext {
        display: block;
        margin-top: 0.35rem;
        color: color-mix(in oklab, currentColor 60%, transparent);
        font-size: 0.875rem;
      }

      form p ul,
      .errorlist {
        margin-top: 0.5rem;
        padding-left: 1.25rem;
        color: var(--color-error);
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body class="min-h-screen bg-base-200 text-base-content">
    <header class="navbar sticky top-0 z-50 border-b border-base-300 bg-base-100 px-4 shadow-sm">
      <div class="mx-auto flex w-full max-w-6xl flex-col gap-3 sm:flex-row">
        <div class="flex-1">
          <a class="btn btn-ghost h-16 px-2" href="{% url 'home' %}" aria-label="Taskmaster">
            <img class="h-20 w-auto object-contain" src="{% static 'images/taskmaster.png' %}" alt="" />
          </a>
        </div>
        <nav class="flex flex-wrap items-center gap-2" aria-label="Navegação principal">
          <a class="btn btn-ghost btn-sm" href="{% url 'home' %}">Início</a>
          {% if user.is_authenticated %}
            <a class="btn btn-ghost btn-sm" href="{% url 'tasks:list_list' %}">Ver listas</a>
            <form action="{% url 'users:logout' %}" method="post">
              {% csrf_token %}
              <button class="btn btn-outline btn-sm" type="submit">Sair</button>
            </form>
          {% else %}
            <a class="btn btn-ghost btn-sm" href="{% url 'users:login' %}">Entrar</a>
            <a class="btn btn-primary btn-sm" href="{% url 'users:register' %}">Cadastrar</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="mx-auto w-full max-w-6xl px-4 py-8">
      {% if messages %}
        <div class="mb-6 space-y-2">
          {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
