<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}Trab1 Web{% endblock %}
    </title>
    <style>
      :root {
        --header-height: 72px;
        --header-bg: #111827;
        --header-border: rgba(255, 255, 255, 0.08);
        --header-link: #e5e7eb;
        --header-link-hover: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding-top: var(--header-height);
        font-family: Arial, sans-serif;
        background: #f7f7f8;
        color: #111827;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--header-bg);
        border-bottom: 1px solid var(--header-border);
        padding: 0 1.25rem;
      }

      .topbar__inner {
        width: 100%;
        max-width: 1200px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .topbar__brand {
        display: inline-flex;
        align-items: center;
        gap: 0;
        color: var(--header-link-hover);
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: visible;
      }

      .topbar__brand img {
        display: block;
        height: 120px;
        width: auto;
        object-fit: contain;
        transform: scale(0.5);
        transform-origin: left center;
      }

      .topbar__nav {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .topbar__nav a,
      .topbar__nav button {
        color: var(--header-link);
        background: transparent;
        border: 0;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
        padding: 0.45rem 0.6rem;
        border-radius: 0.5rem;
      }

      .topbar__nav a:hover,
      .topbar__nav button:hover {
        color: var(--header-link-hover);
        background: rgba(255, 255, 255, 0.08);
      }

      .topbar__form {
        margin: 0;
      }

      main {
        padding: 1.5rem;
      }

      @media (max-width: 640px) {
        :root {
          --header-height: auto;
        }

        body {
          padding-top: 0;
        }

        .topbar {
          position: sticky;
          height: auto;
          padding: 0.75rem 1rem;
        }

        .topbar__inner {
          flex-direction: column;
          align-items: flex-start;
        }

        .topbar__nav {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="topbar__brand" href="{% url 'home' %}" aria-label="Taskmaster">
          <img src="{% static 'images/taskmaster.png' %}" alt="" />
        </a>
        <nav class="topbar__nav" aria-label="Navegação principal">
          <a href="{% url 'home' %}">Início</a>
          {% if user.is_authenticated %}
            <a href="{% url 'tasks:list_list' %}">Ver listas</a>
            <form class="topbar__form" action="{% url 'users:logout' %}" method="post">
              {% csrf_token %}
              <button type="submit">Sair</button>
            </form>
          {% else %}
            <a href="{% url 'users:login' %}">Entrar</a>
            <a href="{% url 'users:register' %}">Cadastrar</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main>
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
