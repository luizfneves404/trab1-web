{% extends "base.html" %}
{% block title %}
  Entrar — Trab1 Web
{% endblock %}
{% block content %}
  <h1>Entrar</h1>
  <form method="post" action="{% url 'users:login' %}">
    {% csrf_token %}
    {% if next %}<input type="hidden" name="next" value="{{ next }}" />{% endif %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
  </form>
  <p><a href="{% url 'users:register' %}">Criar conta</a></p>
  <p><a href="{% url 'users:password_reset' %}">Esqueceu a senha?</a></p>
{% endblock %}
