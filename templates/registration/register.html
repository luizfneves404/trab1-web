{% extends "base.html" %}
{% block title %}
  Cadastro — Trab1 Web
{% endblock %}
{% block content %}
  <h1>Cadastrar</h1>
  <form method="post" action="{% url 'users:register' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Cadastrar</button>
  </form>
  <p><a href="{% url 'users:login' %}">Já tenho conta</a></p>
{% endblock %}
