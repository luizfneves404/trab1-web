{% extends "base.html" %}
{% block title %}
  Cadastro - Trab1 Web
{% endblock %}
{% block content %}
  <div class="mx-auto max-w-md">
    <section class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <h1 class="card-title text-3xl">Cadastrar</h1>
        <form method="post" action="{% url 'users:register' %}">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary w-full" type="submit">Cadastrar</button>
        </form>
        <a class="link text-sm" href="{% url 'users:login' %}">Já tenho conta</a>
      </div>
    </section>
  </div>
{% endblock %}
