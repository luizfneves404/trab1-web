{% extends "base.html" %}

{% block title %}Recuperar senha{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <section class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <h1 class="card-title text-3xl">Recuperar senha</h1>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary w-full" type="submit">Enviar</button>
        </form>
      </div>
    </section>
  </div>
{% endblock %}
