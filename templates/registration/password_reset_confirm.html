{% extends "base.html" %}

{% block title %}Nova senha{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <section class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <h1 class="card-title text-3xl">Nova senha</h1>
        {% if validlink %}
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-full" type="submit">Salvar</button>
          </form>
        {% else %}
          <div class="alert alert-error">Link inválido ou expirado.</div>
        {% endif %}
      </div>
    </section>
  </div>
{% endblock %}
